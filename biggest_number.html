  <body>
    <h3>
      Question 8 Make a program to check: Biggest number between 2 numbers
    </h3>

    <h1 id="result"></h1>

    <script>
      let result = document.getElementById("result");
      let number1 = Number(prompt(" Enter Your First Number "));

      let number2 = Number(prompt(" Enter Your Second Number "));
      if (number1 === number2) {
        result.innerText = "Both Numbers are Equal";
      } else if (number1 > number2) {
        result.innerText = " first number is biggest Number  ";
      } else {
        result.innerText = " second number is biggest  Number ";
      }
    </script>
  </body>
</html>
