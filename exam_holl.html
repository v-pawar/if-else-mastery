<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      Question 17 Make a program to check: User can enter exam hall or not
    </h1>
    <h3 id="result"></h3>
    <script>
      let result = document.getElementById("result");
      let age = Number(prompt("Enter your Age"));
      let hasHallTicket = prompt("you have hall ticket yes or no ");

      if (age >= 18 && hasHallTicket === "yes") {
        result.innerText = "Allowed in Exam Hall";
      } else if (hasHallTicket === "no") {
        result.innerText = "Hall Ticket Required";
      } else {
        result.innerText = "Age Not Eligible";
      }
    </script>
  </body>
</html>
