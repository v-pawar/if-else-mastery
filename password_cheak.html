<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h4>
      Question 6 Make a program to check: User entered password is correct or
      wrong
    </h4>
    <h1 id="result"></h1>
    <script>
      let pass = prompt(" Enter Your Password ");
      let result = document.getElementById("result");

      let correctpass = "Error123";

      if (pass === correctpass) {
        result.innerText = " Login Successful ";
      } else {
        result.innerText = " Wrong Password ";
      }
    </script>
  </body>
</html>
